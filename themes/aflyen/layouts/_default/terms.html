{{ define "main" }}
  <section>
    <header class="list-header">
      <h1>{{ .Title }}</h1>
    </header>
    <ul class="terms-list">
      {{ range .Data.Terms.Alphabetical }}
        <li>
          <a href="{{ .Page.RelPermalink }}">{{ .Page.Title }}</a>
          <span>{{ .Count }}</span>
        </li>
      {{ end }}
    </ul>
  </section>
{{ end }}
