{{ define "main" }}
  <article class="article-shell">
    <header class="article-header">
      <h1>{{ .Title }}</h1>
      {{ partial "article-meta.html" . }}
      {{ with .Params.tags }}
        <ul class="tag-list">
          {{ range . }}
            <li><a href="{{ "/tags/" | relURL }}{{ . | urlize }}/">{{ . }}</a></li>
          {{ end }}
        </ul>
      {{ end }}
    </header>
    <div class="article-content">
      {{ .Content }}
    </div>
  </article>
{{ end }}
