{{ define "main" }}
  <section>
    <header class="list-header">
      <h1>{{ .Title }}</h1>
    </header>
    <div class="post-list">
      {{ range .Pages.ByDate.Reverse }}
        <article class="post-card">
          <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
          {{ partial "article-meta.html" . }}
        </article>
      {{ end }}
    </div>
  </section>
{{ end }}
