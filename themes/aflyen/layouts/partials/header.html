<header class="site-header">
  <div class="site-header__inner">
    <a class="site-brand" href="{{ "/" | relURL }}">
      <span class="site-brand__mark" aria-hidden="true"></span>
      <span class="site-brand__text">
        <span class="site-brand__name">{{ site.Title }}</span>
        {{ with site.Params.description }}<span class="site-brand__tagline">{{ . }}</span>{{ end }}
      </span>
    </a>
    <nav class="site-nav" aria-label="Main navigation">
      {{ range site.Menus.main }}
        <a class="site-nav__link{{ if $.IsMenuCurrent "main" . }} is-active{{ end }}" href="{{ .URL }}">
          {{ .Name }}
        </a>
      {{ end }}
    </nav>
  </div>
</header>
